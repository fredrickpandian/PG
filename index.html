<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandian Global | Executive Technology & Systems Advisory</title>
<meta name="description" content="Pandian Global provides executive advisory, ERP, AI, finance systems, global operations, and nonprofit management consulting.">
<style>
:root{
--ink:#1b1b1b;
--navy:#0c2d6b;
--teal:#12b8b0;
--gold:#d9a441;
--soft:#f7f8fb;
--muted:#667085;
--line:rgba(12,45,107,.12);
--shadow:0 22px 60px rgba(12,45,107,.14)
}
/* existing styles retained */
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--soft);color:var(--ink)}
.top{height:84px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(22px,5vw,72px);background:white;box-shadow:0 10px 30px rgba(12,45,107,.08);position:sticky;top:0;z-index:20}
.nav .contact{background:var(--teal);color:white;padding:11px 16px;border-radius:999px}
.landing{min-height:calc(100vh - 84px);display:grid;grid-template-columns:1fr .95fr;background:linear-gradient(135deg,#0c2d6b 0%, #12b8b0 45%, #0c2d6b 100%);color:white}
.left:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(12,45,107,.92),rgba(12,45,107,.55)),url('hero-bg.png') center/cover;opacity:.55}
.kicker{color:var(--gold)}
.founder img{
width:92px;
height:92px;
border-radius:50%;
object-fit:cover;
object-position:center 18%;
border:4px solid rgba(255,255,255,.85);
}
.wordmark{background:white;color:var(--navy)}
.linkedin{background:var(--teal);color:white;width:100%;border-radius:14px}
.cta{max-width:1180px;margin:0 auto 54px;background:linear-gradient(135deg,#0c2d6b,#12b8b0);color:white;border-radius:28px;padding:34px clamp(24px,4vw,44px)}
</style>
</head>
<body>
<script>
window.location.href='https://fredrickpandian.github.io/PG/';
</script>
</body>
</html>
